apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ims

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - infrastructure.yaml
  - api-gateway.yaml
  - microservices.yaml
  - ingress.yaml
  - network-policy.yaml
  - web-apps.yaml
  - monitoring.yaml
  - hpa.yaml
  - pdb.yaml
  - service-monitors.yaml

# Apply securityContext to all backend microservices
patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
    target:
      kind: Deployment
      labelSelector: 'tier=backend'

configMapGenerator:
  # Grafana datasource provisioning
  - name: grafana-provisioning-datasources
    options:
      disableNameSuffixHash: true
    files:
      - ../../monitoring/grafana/provisioning/datasources/prometheus.yaml
      - ../../monitoring/grafana/provisioning/datasources/alertmanager.yaml
  # Grafana dashboard provider config
  - name: grafana-provisioning-dashboards
    options:
      disableNameSuffixHash: true
    files:
      - ../../monitoring/grafana/provisioning/dashboards/dashboards.yaml
  # Grafana alerting provisioning
  - name: grafana-provisioning-alerting
    options:
      disableNameSuffixHash: true
    files:
      - ../../monitoring/grafana/provisioning/alerting/contact-points.yaml
      - ../../monitoring/grafana/provisioning/alerting/notification-policy.yaml
      - ../../monitoring/grafana/provisioning/alerting/rules.yaml
  # Grafana dashboard JSON files (auto-discovered by the provisioning config)
  - name: grafana-dashboards
    options:
      disableNameSuffixHash: true
    files:
      - ../../monitoring/grafana/dashboards/ims-overview.json
      - ../../monitoring/grafana/dashboards/api-performance.json
      - ../../monitoring/grafana/dashboards/security-events.json
      - ../../monitoring/grafana/dashboards/slo-overview.json

commonLabels:
  app.kubernetes.io/name: ims
  app.kubernetes.io/part-of: integrated-management-system
  app.kubernetes.io/managed-by: kustomize

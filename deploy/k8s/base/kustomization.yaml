apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ims

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - infrastructure.yaml
  - api-gateway.yaml
  - microservices.yaml
  - ingress.yaml
  - network-policy.yaml
  - web-apps.yaml
  - monitoring.yaml
  - hpa.yaml
  - pdb.yaml

# Apply securityContext to all backend microservices
patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
    target:
      kind: Deployment
      labelSelector: 'tier=backend'

commonLabels:
  app.kubernetes.io/name: ims
  app.kubernetes.io/part-of: integrated-management-system
  app.kubernetes.io/managed-by: kustomize

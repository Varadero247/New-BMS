# Web Dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  namespace: ims
  labels:
    app: web-dashboard
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
        tier: frontend
    spec:
      containers:
        - name: web-dashboard
          image: nexara/web-dashboard:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ims-config
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: web-dashboard
  namespace: ims
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: web-dashboard

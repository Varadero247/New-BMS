  alerts.yaml: |
    groups:
      - name: ims-availability
        rules:
          - alert: ServiceDown
            expr: up{job=~"ims-.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: 'Service {{ $labels.job }} is down'
              description: 'Service {{ $labels.job }} has been down for more than 1 minute.'
          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{job=~"ims-.*", status_code=~"5.."}[5m])) by (job)
              / sum(rate(http_requests_total{job=~"ims-.*"}[5m])) by (job) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'High error rate on {{ $labels.job }}'
              description: 'Service {{ $labels.job }} error rate > 5% for 5 minutes.'
          - alert: CriticalErrorRate
            expr: |
              sum(rate(http_requests_total{job=~"ims-.*", status_code=~"5.."}[5m])) by (job)
              / sum(rate(http_requests_total{job=~"ims-.*"}[5m])) by (job) > 0.10
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: 'Critical error rate on {{ $labels.job }}'
              description: 'Service {{ $labels.job }} error rate > 10% for 2 minutes.'
      - name: ims-latency
        rules:
          - alert: HighLatency
            expr: |
              histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (job, le)) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'High latency on {{ $labels.job }}'
              description: 'Service {{ $labels.job }} P95 latency > 500ms for 5 minutes.'
          - alert: CriticalLatency
            expr: |
              histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (job, le)) > 2
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: 'Critical latency on {{ $labels.job }}'
              description: 'Service {{ $labels.job }} P99 latency > 2s for 2 minutes.'
      - name: ims-security
        rules:
          - alert: HighAuthenticationFailures
            expr: sum(rate(auth_failures_total{job=~"ims-.*"}[5m])) > 10
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'High authentication failures'
              description: 'More than 10 auth failures per second detected.'
          - alert: RateLimitBreached
            expr: sum(rate(rate_limit_exceeded_total{job=~"ims-.*"}[5m])) > 50
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: 'Rate limit frequently exceeded'
              description: 'Rate limiting is being triggered frequently.'

  recording.yaml: |
    groups:
      - name: ims:request_rates
        interval: 30s
        rules:
          - record: job:http_requests:rate5m
            expr: sum(rate(http_requests_total{job=~"ims-.*"}[5m])) by (job)
          - record: job:http_requests_errors:rate5m
            expr: sum(rate(http_requests_total{job=~"ims-.*", status_code=~"5.."}[5m])) by (job)
          - record: job:http_requests_error_ratio:rate5m
            expr: |
              job:http_requests_errors:rate5m / on(job) job:http_requests:rate5m
          - record: cluster:http_requests:rate5m
            expr: sum(rate(http_requests_total{job=~"ims-.*"}[5m]))
          - record: cluster:http_requests_errors:rate5m
            expr: sum(rate(http_requests_total{job=~"ims-.*", status_code=~"5.."}[5m]))
          - record: cluster:http_requests_error_ratio:rate5m
            expr: cluster:http_requests_errors:rate5m / cluster:http_requests:rate5m
      - name: ims:latency
        interval: 30s
        rules:
          - record: job:http_request_duration_seconds:p95
            expr: |
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (job, le))
          - record: job:http_request_duration_seconds:p99
            expr: |
              histogram_quantile(0.99,
                sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (job, le))
          - record: cluster:http_request_duration_seconds:p95
            expr: |
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (le))
          - record: cluster:http_request_duration_seconds:p99
            expr: |
              histogram_quantile(0.99,
                sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (le))
      - name: ims:slo
        interval: 60s
        rules:
          - record: cluster:availability:rate1h
            expr: |
              sum(rate(http_requests_total{job=~"ims-.*", status_code!~"5.."}[1h]))
              / sum(rate(http_requests_total{job=~"ims-.*"}[1h]))
          - record: cluster:http_requests_error_ratio:rate1h
            expr: |
              1 - (sum(rate(http_requests_total{job=~"ims-.*", status_code!~"5.."}[1h]))
              / sum(rate(http_requests_total{job=~"ims-.*"}[1h])))
          - record: cluster:http_requests_error_ratio:rate6h
            expr: |
              1 - (sum(rate(http_requests_total{job=~"ims-.*", status_code!~"5.."}[6h]))
              / sum(rate(http_requests_total{job=~"ims-.*"}[6h])))
      - name: ims:security
        interval: 60s
        rules:
          - record: cluster:auth_failures:rate5m
            expr: sum(rate(auth_failures_total{job=~"ims-.*"}[5m]))
          - record: cluster:rate_limit_exceeded:rate5m
            expr: sum(rate(rate_limit_exceeded_total{job=~"ims-.*"}[5m]))

# ── Alertmanager ConfigMap ─────────────────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: ims
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: ims-default
      routes:
        - receiver: ims-critical
          matchers:
            - severity = critical
          group_wait: 10s
          repeat_interval: 30m
        - receiver: ims-warning
          matchers:
            - severity = warning
          group_wait: 30s
          repeat_interval: 2h
    receivers:
      - name: ims-default
        webhook_configs:
          - url: '${ALERTMANAGER_WEBHOOK_URL}'
            send_resolved: true
      - name: ims-critical
        webhook_configs:
          - url: '${ALERTMANAGER_WEBHOOK_URL}'
            send_resolved: true
      - name: ims-warning
        webhook_configs:
          - url: '${ALERTMANAGER_WEBHOOK_URL}'
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: [alertname, job]

# ── Prometheus PersistentVolumeClaim ──────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: ims
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-data
  namespace: ims
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: ims
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

# ── Prometheus Deployment ─────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ims
  labels:
    app: prometheus
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        tier: monitoring
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=30d'
            - '--web.enable-lifecycle'
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '1Gi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: alerts.yaml
                path: alerts.yaml
              - key: recording.yaml
                path: recording.yaml
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ims
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090

# ── Alertmanager Deployment ───────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: ims
  labels:
    app: alertmanager
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        tier: monitoring
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          ports:
            - containerPort: 9093
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
          envFrom:
            - secretRef:
                name: ims-monitoring-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '200m'
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          persistentVolumeClaim:
            claimName: alertmanager-data

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: ims
  labels:
    app: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: 9093

# ── Grafana Deployment ────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ims
  labels:
    app: grafana
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        tier: monitoring
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: ims-monitoring-secrets
                  key: GRAFANA_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ims-monitoring-secrets
                  key: GRAFANA_PASSWORD
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
            - name: GF_ALERTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
          envFrom:
            - secretRef:
                name: ims-monitoring-secrets
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: provisioning-alerting
              mountPath: /etc/grafana/provisioning/alerting
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: provisioning-datasources
          configMap:
            name: grafana-provisioning-datasources
        - name: provisioning-dashboards
          configMap:
            name: grafana-provisioning-dashboards
        - name: provisioning-alerting
          configMap:
            name: grafana-provisioning-alerting
        - name: dashboards
          configMap:
            name: grafana-dashboards

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ims
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000

# ── Monitoring Secrets (values populated by overlays/prod/secrets.yaml) ───────
---
apiVersion: v1
kind: Secret
metadata:
  name: ims-monitoring-secrets
  namespace: ims
type: Opaque
stringData:
  GRAFANA_USER: "admin"
  GRAFANA_PASSWORD: "CHANGE_ME"
  ALERT_EMAIL: "ops@example.com"
  SLACK_WEBHOOK_URL: ""
  ALERTMANAGER_WEBHOOK_URL: ""
  GRAFANA_SMTP_HOST: "smtp.sendgrid.net:587"
  GRAFANA_SMTP_USER: ""
  GRAFANA_SMTP_PASS: ""

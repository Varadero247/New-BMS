# IMS Monitoring Stack — Kubernetes Manifests
# Deploys Prometheus, Alertmanager, and Grafana into the ims namespace.
# Uses ConfigMaps to mount configuration files.

# ── Namespace-scoped RBAC for Prometheus service discovery ──────────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: ims

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ims-prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ims-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ims-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: ims

# ── Prometheus ConfigMap ──────────────────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ims
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
    rule_files:
      - /etc/prometheus/rules/*.yaml
    scrape_configs:
      - job_name: ims-gateway
        static_configs:
          - targets: ['api-gateway:4000']
      - job_name: ims-health-safety
        static_configs:
          - targets: ['api-health-safety:4001']
      - job_name: ims-environment
        static_configs:
          - targets: ['api-environment:4002']
      - job_name: ims-quality
        static_configs:
          - targets: ['api-quality:4003']
      - job_name: ims-ai-analysis
        static_configs:
          - targets: ['api-ai-analysis:4004']
      - job_name: ims-inventory
        static_configs:
          - targets: ['api-inventory:4005']
      - job_name: ims-hr
        static_configs:
          - targets: ['api-hr:4006']
      - job_name: ims-payroll
        static_configs:
          - targets: ['api-payroll:4007']
      - job_name: ims-workflows
        static_configs:
          - targets: ['api-workflows:4008']
      - job_name: ims-project-management
        static_configs:
          - targets: ['api-project-management:4009']
      - job_name: ims-automotive
        static_configs:
          - targets: ['api-automotive:4010']
      - job_name: ims-medical
        static_configs:
          - targets: ['api-medical:4011']
      - job_name: ims-aerospace
        static_configs:
          - targets: ['api-aerospace:4012']
      - job_name: ims-finance
        static_configs:

      - job_name: ims-crm
        static_configs:
          - targets: ['api-crm:4014']
      - job_name: ims-infosec
        static_configs:
          - targets: ['api-infosec:4015']
      - job_name: ims-esg
        static_configs:
          - targets: ['api-esg:4016']
      - job_name: ims-cmms
        static_configs:
          - targets: ['api-cmms:4017']
      - job_name: ims-portal
        static_configs:
          - targets: ['api-portal:4018']
      - job_name: ims-food-safety
        static_configs:
          - targets: ['api-food-safety:4019']
      - job_name: ims-energy
        static_configs:
          - targets: ['api-energy:4020']
      - job_name: ims-analytics
        static_configs:
          - targets: ['api-analytics:4021']
      - job_name: ims-field-service
        static_configs:
          - targets: ['api-field-service:4022']
      - job_name: ims-iso42001
        static_configs:
          - targets: ['api-iso42001:4023']
      - job_name: ims-iso37001
        static_configs:
          - targets: ['api-iso37001:4024']
      - job_name: ims-marketing
        static_configs:
          - targets: ['api-marketing:4025']
      - job_name: ims-partners
        static_configs:
          - targets: ['api-partners:4026']
      - job_name: ims-risk
        static_configs:

# ServiceMonitor resources for Prometheus Operator
# Defines how Prometheus scrapes metrics from each IMS microservice.
# Requires: kube-prometheus-stack or prometheus-operator installed in cluster.
#
# To use: ensure the Prometheus CRD serviceMonitorSelector matches
#         the label `app.kubernetes.io/part-of: ims`
#
# Apply:
#   kubectl apply -f deploy/k8s/base/service-monitors.yaml

---
# ── API Gateway ──────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ims-api-gateway
  namespace: ims
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: ims
    tier: monitoring
spec:
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
      scrapeTimeout: 8s
      honorLabels: true


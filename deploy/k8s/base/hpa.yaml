apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-health-safety-hpa
  namespace: ims
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-health-safety
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---

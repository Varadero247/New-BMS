# Health & Safety Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-health-safety
  namespace: ims
  labels:
    app: api-health-safety
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-health-safety
  template:
    metadata:
      labels:
        app: api-health-safety
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-health-safety
          image: ims/api-health-safety:latest
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: ims-config
            - secretRef:
                name: ims-secrets
          env:
            - name: PORT
              value: "4001"
            - name: OTEL_SERVICE_NAME
              value: "api-health-safety"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-health-safety
  namespace: ims
spec:
  type: ClusterIP
  ports:
    - port: 4001
      targetPort: 4001
  selector:
    app: api-health-safety

# NOTE: In production, use External Secrets Operator or Sealed Secrets
# This file contains placeholder values - replace with your secrets management solution
apiVersion: v1
kind: Secret
metadata:
  name: ims-secrets
  namespace: ims
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims?schema=public"
  CORE_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_core?schema=public"
  HR_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_hr?schema=public"
  PAYROLL_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_payroll?schema=public"
  QUALITY_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_quality?schema=public"
  HEALTH_SAFETY_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_health_safety?schema=public"
  ENVIRONMENT_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_environment?schema=public"
  INVENTORY_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_inventory?schema=public"
  WORKFLOWS_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_workflows?schema=public"
  AI_DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgresql:5432/ims_ai_analysis?schema=public"

  # JWT
  JWT_SECRET: "CHANGE_ME_TO_A_SECURE_64_CHARACTER_RANDOM_STRING_FOR_PRODUCTION"
  JWT_REFRESH_SECRET: "CHANGE_ME_TO_ANOTHER_SECURE_64_CHARACTER_STRING_FOR_REFRESH"
  SERVICE_SECRET: "CHANGE_ME_TO_A_SECURE_32_CHARACTER_STRING_FOR_SERVICES"

  # Redis
  REDIS_URL: "redis://:CHANGE_ME@redis:6379"
  REDIS_PASSWORD: "CHANGE_ME"

  # Session
  SESSION_SECRET: "CHANGE_ME_TO_A_SECURE_SESSION_SECRET"

  # Vault (optional)
  VAULT_TOKEN: ""

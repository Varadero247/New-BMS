apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ims-dev

namePrefix: dev-

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      labelSelector: "tier=backend"
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: api-gateway

configMapGenerator:
  - name: ims-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      # NOTE: Do NOT set CORS_ORIGIN — see CLAUDE.md Known Issue #3

secretGenerator:
  - name: ims-secrets
    behavior: merge
    literals:
      - DATABASE_URL=postgresql://postgres:devpassword@postgresql:5432/ims_dev?schema=public

commonLabels:
  environment: development

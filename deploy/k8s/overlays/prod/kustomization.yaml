apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ims

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      labelSelector: 'tier=backend'
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: api-gateway
  # Increase resource limits for production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
    target:
      kind: Deployment
      labelSelector: 'tier=backend'

configMapGenerator:
  - name: ims-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      # NOTE: Do NOT set CORS_ORIGIN — see CLAUDE.md Known Issue #3.
      # The gateway uses a built-in allowed-origins array. Setting CORS_ORIGIN
      # overrides it and breaks cross-origin requests.
      # Enable distributed tracing in production
      - OTEL_TRACING_ENABLED=true

commonLabels:
  environment: production

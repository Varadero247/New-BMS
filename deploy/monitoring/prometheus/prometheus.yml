# =============================================================================
# IMS Prometheus Configuration
# Scrapes metrics from all 43 API services + api-search and loads alert rules.
# =============================================================================

global:
  scrape_interval: 15s       # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate alert rules
  scrape_timeout: 10s
  external_labels:
    cluster: 'ims'
    environment: '{{ env "NODE_ENV" | default "production" }}'

# ─── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

# ─── Alert Rules ──────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yaml

# ─── Scrape Configs ───────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager self-monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # ── IMS API Services ──────────────────────────────────────────────────────
  - job_name: 'ims-api-gateway'
    static_configs:
      - targets: ['api-gateway:4000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'ims-api-health-safety'
    static_configs:
      - targets: ['api-health-safety:4001']
    metrics_path: /metrics

  - job_name: 'ims-api-environment'

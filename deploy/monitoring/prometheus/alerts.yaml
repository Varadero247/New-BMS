groups:
  - name: ims-availability
    rules:
      - alert: ServiceDown
        expr: up{job=~"ims-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Service {{ $labels.job }} is down'
          description: 'Service {{ $labels.job }} has been down for more than 1 minute.'
          runbook_url: "https://docs.nexara.io/runbooks/ServiceDown"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{job=~"ims-.*", status_code=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total{job=~"ims-.*"}[5m])) by (job) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High error rate on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} has error rate > 5% for 5 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/HighErrorRate"

      - alert: CriticalErrorRate
        expr: |
          sum(rate(http_requests_total{job=~"ims-.*", status_code=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total{job=~"ims-.*"}[5m])) by (job) > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Critical error rate on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} has error rate > 10% for 2 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/CriticalErrorRate"

  - name: ims-latency
    rules:
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (job, le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High latency on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} P95 latency > 500ms for 5 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/HighLatency"

      - alert: CriticalLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (job, le)) > 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Critical latency on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} P99 latency > 2s for 2 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/CriticalLatency"

  - name: ims-resources
    rules:
      - alert: HighMemoryUsage
        expr: |
          (process_resident_memory_bytes{job=~"ims-.*"} / 1024 / 1024) > 400
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High memory usage on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} is using more than 400MB of memory.'
          runbook_url: "https://docs.nexara.io/runbooks/HighMemoryUsage"

      - alert: HighCPUUsage
        expr: |
          rate(process_cpu_seconds_total{job=~"ims-.*"}[5m]) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High CPU usage on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} CPU usage > 80% for 10 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/HighCPUUsage"

  - name: ims-security
    rules:
      # auth_failures_total is now emitted by api-gateway/src/routes/auth.ts
      - alert: HighAuthenticationFailures
        expr: |
          sum(rate(auth_failures_total{job=~"ims-.*"}[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High authentication failures'
          description: 'More than 10 auth failures per second detected.'
          runbook_url: "https://docs.nexara.io/runbooks/HighAuthenticationFailures"

      # rate_limit_exceeded_total is now emitted by api-gateway/src/middleware/rate-limiter.ts
      - alert: RateLimitBreached
        expr: |
          sum(rate(rate_limit_exceeded_total{job=~"ims-.*"}[5m])) > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'Rate limit frequently exceeded'
          description: 'Rate limiting is being triggered frequently.'
          runbook_url: "https://docs.nexara.io/runbooks/RateLimitBreached"

  - name: slo
    # Multi-window burn rate alerts: fire when error budget burns at 14.4× (1h/5m)
    # or 6× (6h/30m) the sustainable rate (99.9% SLO = 0.1% error budget).
    # Based on Google SRE Workbook multi-burn-rate alert model.
    # Target SLO: 99.9% availability (30-day error budget = 43.8 minutes)
    rules:
      # ── Burn Rate: Critical Page (fast burn) ─────────────────────────────────
      # 14.4× burn rate detected in short windows → page immediately
      # At 14.4×, the 30-day error budget exhausts in ~2 hours
      - alert: SloBurnRateCritical
        expr: |
          (
            cluster:http_requests_error_ratio:rate5m > (14.4 * 0.001)
          ) and (
            cluster:http_requests_error_ratio:rate1h > (14.4 * 0.001)
          )
        for: 2m
        labels:
          severity: critical
          team: platform
          window: "1h/5m"
        annotations:
          summary: "SLO error budget burning critically fast ({{ $value | humanizePercentage }} error rate)"
          description: >
            Current error ratio {{ $value | humanizePercentage }} exceeds 14.4× the error budget rate.
            At this rate, the 30-day error budget will be exhausted in approximately 2 hours.
            Immediate action required.
          runbook_url: "https://docs.nexara.io/runbooks/SloBurnRateCritical"

      # ── Burn Rate: High Page ─────────────────────────────────────────────────
      # 6× burn rate detected in medium windows → page the on-call team
      # At 6×, the 30-day error budget exhausts in ~5 hours
      - alert: SloBurnRateHigh
        expr: |
          (
            cluster:http_requests_error_ratio:rate5m > (6 * 0.001)
          ) and (
            cluster:http_requests_error_ratio:rate6h > (6 * 0.001)
          )
        for: 5m
        labels:
          severity: critical
          team: platform
          window: "6h/30m"
        annotations:
          summary: "SLO error budget burning fast ({{ $value | humanizePercentage }} error rate)"
          description: >
            Error ratio {{ $value | humanizePercentage }} exceeds 6× the sustainable error budget rate.
            At this rate, the 30-day error budget will be exhausted in approximately 5 hours.
          runbook_url: "https://docs.nexara.io/runbooks/SloBurnRateHigh"

      # ── Burn Rate: Warning Ticket ────────────────────────────────────────────
      # 3× burn rate in 1-day window → create a ticket, investigate this sprint
      # At 3×, the 30-day error budget exhausts in ~10 days
      - alert: SloBurnRateWarning
        expr: |
          cluster:http_requests_error_ratio:rate1h > (3 * 0.001)
        for: 1h
        labels:
          severity: warning
          team: platform
          window: "1d/1h"
        annotations:
          summary: "SLO error budget elevated ({{ $value | humanizePercentage }} error rate)"
          description: >
            Error ratio {{ $value | humanizePercentage }} exceeds 3× the sustainable error budget rate.
            At this rate, the 30-day error budget will be exhausted in approximately 10 days.
            Create a ticket to investigate.
          runbook_url: "https://docs.nexara.io/runbooks/SloBurnRateWarning"

      # ── Per-Service SLO Breach ───────────────────────────────────────────────
      # Individual service degradation affecting that service's SLO
      - alert: SloServiceErrorBudgetCritical
        expr: |
          job:http_requests_error_ratio:rate5m > 0.05
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} error rate {{ $value | humanizePercentage }}"
          description: >
            Service {{ $labels.job }} has an error rate of {{ $value | humanizePercentage }},
            exceeding the 5% per-service SLO threshold.
          runbook_url: "https://docs.nexara.io/runbooks/SloServiceErrorBudgetCritical"

      # ── Latency SLO ──────────────────────────────────────────────────────────
      # Uses recording rules for fast evaluation
      - alert: SloLatencyBudgetCritical
        expr: cluster:http_request_duration_seconds:p99 > 2.0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Cluster P99 latency SLO breach ({{ $value | humanizeDuration }})"
          description: >
            Cluster-wide P99 latency of {{ $value | humanizeDuration }} exceeds the 2-second SLO threshold.
          runbook_url: "https://docs.nexara.io/runbooks/SloLatencyBudgetCritical"

      # ── Service-Level Latency ────────────────────────────────────────────────
      - alert: SloServiceLatencyHigh
        expr: job:http_request_duration_seconds:p95 > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.job }} P95 latency {{ $value | humanizeDuration }}"
          description: >
            Service {{ $labels.job }} P95 latency of {{ $value | humanizeDuration }}
            exceeds 500ms service SLO threshold.
          runbook_url: "https://docs.nexara.io/runbooks/SloServiceLatencyHigh"

  - name: database
    rules:
      - alert: PostgreSQLConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections approaching limit"
          description: "Active connections {{ $value }} approaching max_connections=100"
          runbook_url: "https://docs.nexara.io/runbooks/PostgreSQLConnectionsHigh"

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag > 30
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL replication lag high"
          description: "Replication lag {{ $value }}s exceeds 30s threshold"
          runbook_url: "https://docs.nexara.io/runbooks/PostgreSQLReplicationLag"

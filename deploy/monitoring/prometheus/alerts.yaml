groups:
  - name: ims-availability
    rules:
      - alert: ServiceDown
        expr: up{job=~"ims-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Service {{ $labels.job }} is down'
          description: 'Service {{ $labels.job }} has been down for more than 1 minute.'
          runbook_url: "https://docs.nexara.io/runbooks/ServiceDown"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{job=~"ims-.*", status_code=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total{job=~"ims-.*"}[5m])) by (job) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High error rate on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} has error rate > 5% for 5 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/HighErrorRate"

      - alert: CriticalErrorRate
        expr: |
          sum(rate(http_requests_total{job=~"ims-.*", status_code=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total{job=~"ims-.*"}[5m])) by (job) > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Critical error rate on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} has error rate > 10% for 2 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/CriticalErrorRate"

  - name: ims-latency
    rules:
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (job, le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High latency on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} P95 latency > 500ms for 5 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/HighLatency"

      - alert: CriticalLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~"ims-.*"}[5m])) by (job, le)) > 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Critical latency on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} P99 latency > 2s for 2 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/CriticalLatency"

  - name: ims-resources
    rules:
      - alert: HighMemoryUsage
        expr: |
          (process_resident_memory_bytes{job=~"ims-.*"} / 1024 / 1024) > 400
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High memory usage on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} is using more than 400MB of memory.'
          runbook_url: "https://docs.nexara.io/runbooks/HighMemoryUsage"

      - alert: HighCPUUsage
        expr: |
          rate(process_cpu_seconds_total{job=~"ims-.*"}[5m]) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High CPU usage on {{ $labels.job }}'
          description: 'Service {{ $labels.job }} CPU usage > 80% for 10 minutes.'
          runbook_url: "https://docs.nexara.io/runbooks/HighCPUUsage"

  - name: ims-security
    rules:
      # auth_failures_total is now emitted by api-gateway/src/routes/auth.ts
      - alert: HighAuthenticationFailures
        expr: |
          sum(rate(auth_failures_total{job=~"ims-.*"}[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High authentication failures'
          description: 'More than 10 auth failures per second detected.'
          runbook_url: "https://docs.nexara.io/runbooks/HighAuthenticationFailures"

      # rate_limit_exceeded_total is now emitted by api-gateway/src/middleware/rate-limiter.ts
      - alert: RateLimitBreached
        expr: |
          sum(rate(rate_limit_exceeded_total{job=~"ims-.*"}[5m])) > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'Rate limit frequently exceeded'
          description: 'Rate limiting is being triggered frequently.'
          runbook_url: "https://docs.nexara.io/runbooks/RateLimitBreached"

  - name: slo
    rules:
      - alert: SLOErrorBudgetCritical
        expr: |
          (1 - (sum(rate(http_requests_total{status!~"5.."}[1h])) / sum(rate(http_requests_total[1h])))) > 0.001
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "SLO error budget critically depleted"
          description: "Error budget consumption rate indicates SLO breach within 24 hours"
          runbook_url: "https://docs.nexara.io/runbooks/SLOErrorBudgetCritical"

      - alert: SLOLatencyBudgetCritical
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[1h])) by (le)) > 2.0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "P99 latency SLO breach"
          description: "P99 latency exceeds 2 seconds, impacting SLO compliance"
          runbook_url: "https://docs.nexara.io/runbooks/SLOLatencyBudgetCritical"

  - name: database
    rules:
      - alert: PostgreSQLConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections approaching limit"
          description: "Active connections {{ $value }} approaching max_connections=100"
          runbook_url: "https://docs.nexara.io/runbooks/PostgreSQLConnectionsHigh"

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag > 30
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL replication lag high"
          description: "Replication lag {{ $value }}s exceeds 30s threshold"
          runbook_url: "https://docs.nexara.io/runbooks/PostgreSQLReplicationLag"

# Grafana Unified Alerting — Contact Points
# Mirrors the Alertmanager receivers so Grafana-managed alerts use the same channels.
# Environment variables are resolved at container startup via GF_UNIFIED_ALERTING_* settings.
apiVersion: 1

contactPoints:
  # ── Default (low-priority) ──────────────────────────────────────────────────
  - orgId: 1
    name: ims-default
    receivers:
      - uid: ims-default-email
        type: email
        settings:
          addresses: "${ALERT_EMAIL}"
          subject: "[IMS] {{ .CommonLabels.alertname }}"
          message: |
            {{ range .Alerts }}
            Alert: {{ .Annotations.summary }}
            Description: {{ .Annotations.description }}
            Severity: {{ .Labels.severity }}
            Service: {{ .Labels.job }}
            {{ end }}

  # ── Critical ─────────────────────────────────────────────────────────────────
  - orgId: 1
    name: ims-critical
    receivers:
      - uid: ims-critical-email
        type: email
        settings:
          addresses: "${ALERT_EMAIL}"
          subject: "[IMS CRITICAL] {{ .CommonLabels.alertname }}"
          message: |
            🚨 CRITICAL ALERT

            {{ range .Alerts }}
            Alert: {{ .Annotations.summary }}
            Description: {{ .Annotations.description }}
            Service: {{ .Labels.job }}
            Since: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
            {{ end }}

      - uid: ims-critical-slack
        type: slack
        settings:
          url: "${SLACK_WEBHOOK_URL}"
          channel: "#ims-alerts-critical"
          username: "IMS Grafana"
          icon_emoji: ":rotating_light:"
          title: "🚨 CRITICAL: {{ .CommonLabels.alertname }}"
          text: |
            {{ range .Alerts }}*{{ .Annotations.summary }}*
            {{ .Annotations.description }}
            *Service:* {{ .Labels.job }} | *Severity:* {{ .Labels.severity }}
            {{ end }}

      - uid: ims-critical-webhook
        type: webhook
        settings:
          url: "${ALERTMANAGER_WEBHOOK_URL}"
          httpMethod: POST

  # ── Warning ──────────────────────────────────────────────────────────────────
  - orgId: 1
    name: ims-warning
    receivers:
      - uid: ims-warning-slack
        type: slack
        settings:
          url: "${SLACK_WEBHOOK_URL}"
          channel: "#ims-alerts"
          username: "IMS Grafana"
          icon_emoji: ":warning:"
          title: "⚠️ WARNING: {{ .CommonLabels.alertname }}"
          text: |
            {{ range .Alerts }}*{{ .Annotations.summary }}*
            {{ .Annotations.description }}
            *Service:* {{ .Labels.job }}
            {{ end }}

      - uid: ims-warning-webhook
        type: webhook
        settings:
          url: "${ALERTMANAGER_WEBHOOK_URL}"
          httpMethod: POST

  # ── Security ─────────────────────────────────────────────────────────────────
  - orgId: 1
    name: ims-security
    receivers:
      - uid: ims-security-email
        type: email
        settings:
          addresses: "${ALERT_EMAIL}"
          subject: "[IMS SECURITY] {{ .CommonLabels.alertname }}"
          message: |
            🔒 SECURITY ALERT

            {{ range .Alerts }}
            Alert: {{ .Annotations.summary }}
            Description: {{ .Annotations.description }}
            {{ end }}

      - uid: ims-security-slack
        type: slack
        settings:
          url: "${SLACK_WEBHOOK_URL}"
          channel: "#ims-security-alerts"
          username: "IMS Security"
          icon_emoji: ":lock:"
          title: "🔒 SECURITY: {{ .CommonLabels.alertname }}"
          text: |
            {{ range .Alerts }}*{{ .Annotations.summary }}*
            {{ .Annotations.description }}
            {{ end }}

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ims}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ims-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # API Services
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    container_name: ims-api-gateway
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      CORE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      SERVICE_HEALTH_SAFETY_URL: http://api-health-safety:4001
      SERVICE_ENVIRONMENT_URL: http://api-environment:4002
      SERVICE_QUALITY_URL: http://api-quality:4003
      SERVICE_AI_ANALYSIS_URL: http://api-ai-analysis:4004
      SERVICE_AI_URL: http://api-ai-analysis:4004
      SERVICE_INVENTORY_URL: http://api-inventory:4005
      SERVICE_HR_URL: http://api-hr:4006
      SERVICE_PAYROLL_URL: http://api-payroll:4007
      SERVICE_WORKFLOWS_URL: http://api-workflows:4008
      SERVICE_PROJECT_MANAGEMENT_URL: http://api-project-management:4009
      CSRF_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-health-safety:
        condition: service_started
      api-environment:
        condition: service_started
      api-quality:
        condition: service_started
      api-ai-analysis:
        condition: service_started
      api-inventory:
        condition: service_started
      api-project-management:
        condition: service_started

  api-health-safety:
    build:
      context: .
      dockerfile: ./apps/api-health-safety/Dockerfile
    container_name: ims-api-health-safety
    restart: unless-stopped
    expose:
      - '4001'
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      HEALTH_SAFETY_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      CORE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy

  api-environment:
    build:
      context: .
      dockerfile: ./apps/api-environment/Dockerfile
    container_name: ims-api-environment
    restart: unless-stopped
    expose:
      - '4002'
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      ENVIRONMENT_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      CORE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy

  api-quality:
    build:
      context: .
      dockerfile: ./apps/api-quality/Dockerfile
    container_name: ims-api-quality
    restart: unless-stopped
    expose:
      - '4003'
    environment:
      NODE_ENV: production
      PORT: 4003
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      QUALITY_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      CORE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy

  api-ai-analysis:
    build:
      context: .
      dockerfile: ./apps/api-ai-analysis/Dockerfile
    container_name: ims-api-ai-analysis
    restart: unless-stopped
    expose:
      - '4004'
    environment:
      NODE_ENV: production
      PORT: 4004
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      AI_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      CORE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  api-inventory:
    build:
      context: .
      dockerfile: ./apps/api-inventory/Dockerfile
    container_name: ims-api-inventory
    restart: unless-stopped
    expose:
      - '4005'
    environment:
      NODE_ENV: production
      PORT: 4005
      INVENTORY_PORT: 4005
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      INVENTORY_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      CORE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy

  api-project-management:
    build:
      context: .
      dockerfile: ./apps/api-project-management/Dockerfile
    container_name: ims-api-project-management
    restart: unless-stopped
    expose:
      - '4009'
    environment:
      NODE_ENV: production
      PORT: 4009
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      PROJECT_MANAGEMENT_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      CORE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AI_API_URL: http://api-ai-analysis:4004
    depends_on:
      postgres:
        condition: service_healthy

  # Web Applications
  web-dashboard:
    build:
      context: .
      dockerfile: ./apps/web-dashboard/Dockerfile
    container_name: ims-web-dashboard
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway

  web-health-safety:
    build:
      context: .
      dockerfile: ./apps/web-health-safety/Dockerfile
    container_name: ims-web-health-safety
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - api-gateway

  web-environment:
    build:
      context: .
      dockerfile: ./apps/web-environment/Dockerfile
    container_name: ims-web-environment
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway

  web-quality:
    build:
      context: .
      dockerfile: ./apps/web-quality/Dockerfile
    container_name: ims-web-quality
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway

  web-settings:
    build:
      context: .
      dockerfile: ./apps/web-settings/Dockerfile
    container_name: ims-web-settings
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway

  web-hr:
    build:
      context: .
      dockerfile: ./apps/web-hr/Dockerfile
    container_name: ims-web-hr
    restart: unless-stopped
    ports:
      - '3006:3006'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway
  web-payroll:
    build:
      context: .
      dockerfile: ./apps/web-payroll/Dockerfile
    container_name: ims-web-payroll
    restart: unless-stopped
    ports:
      - '3007:3007'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway

  web-inventory:
    build:
      context: .
      dockerfile: ./apps/web-inventory/Dockerfile
    container_name: ims-web-inventory
    restart: unless-stopped
    ports:
      - '3005:3005'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway

  web-project-management:
    build:
      context: .
      dockerfile: ./apps/web-project-management/Dockerfile
    container_name: ims-web-project-management
    restart: unless-stopped
    ports:
      - '3009:3009'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:

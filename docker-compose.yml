version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ims}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ims-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # API Services
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    container_name: ims-api-gateway
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      CORE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ims}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      SERVICE_HEALTH_SAFETY_URL: http://api-health-safety:4001
      SERVICE_ENVIRONMENT_URL: http://api-environment:4002
      SERVICE_QUALITY_URL: http://api-quality:4003
      SERVICE_AI_ANALYSIS_URL: http://api-ai-analysis:4004
      SERVICE_AI_URL: http://api-ai-analysis:4004
      SERVICE_INVENTORY_URL: http://api-inventory:4005
      SERVICE_HR_URL: http://host.docker.internal:4006
      SERVICE_PAYROLL_URL: http://host.docker.internal:4007
      SERVICE_WORKFLOWS_URL: http://host.docker.internal:4008
      SERVICE_PROJECT_MANAGEMENT_URL: http://host.docker.internal:4009
      SERVICE_AUTOMOTIVE_URL: http://host.docker.internal:4010
      SERVICE_MEDICAL_URL: http://host.docker.internal:4011
      SERVICE_AEROSPACE_URL: http://host.docker.internal:4012
      SERVICE_FINANCE_URL: http://host.docker.internal:4013
      SERVICE_CRM_URL: http://host.docker.internal:4014
      SERVICE_INFOSEC_URL: http://host.docker.internal:4015
      SERVICE_ESG_URL: http://host.docker.internal:4016
      SERVICE_CMMS_URL: http://host.docker.internal:4017
      SERVICE_PORTAL_URL: http://host.docker.internal:4018
      SERVICE_FOOD_SAFETY_URL: http://host.docker.internal:4019
      SERVICE_ENERGY_URL: http://host.docker.internal:4020
      SERVICE_ANALYTICS_URL: http://host.docker.internal:4021
      SERVICE_FIELD_SERVICE_URL: http://host.docker.internal:4022
      SERVICE_ISO42001_URL: http://host.docker.internal:4023
      SERVICE_ISO37001_URL: http://host.docker.internal:4024
      SERVICE_MARKETING_URL: http://host.docker.internal:4025
      SERVICE_PARTNERS_URL: http://host.docker.internal:4026
      SERVICE_RISK_URL: http://host.docker.internal:4027
      SERVICE_TRAINING_URL: http://host.docker.internal:4028
      SERVICE_SUPPLIERS_URL: http://host.docker.internal:4029
      SERVICE_ASSETS_URL: http://host.docker.internal:4030
      SERVICE_DOCUMENTS_URL: http://host.docker.internal:4031
      SERVICE_COMPLAINTS_URL: http://host.docker.internal:4032
      SERVICE_CONTRACTS_URL: http://host.docker.internal:4033
      SERVICE_PTW_URL: http://host.docker.internal:4034

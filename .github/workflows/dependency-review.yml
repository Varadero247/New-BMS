name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce CRITICAL or HIGH severity vulnerabilities
          fail-on-severity: high
          # Allow licenses used across the platform
          allow-licenses: >-
            MIT,
            ISC,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            0BSD,
            CC0-1.0,
            Unlicense,
            Python-2.0,
            BlueOak-1.0.0
          # Comment on the PR with the dependency review summary
          comment-summary-in-pr: always
          # Warn (not block) on GPL-family licenses
          warn-on-openssf-scorecard-level: 3

name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for critical vulnerabilities (must pass)
        run: pnpm audit --audit-level=critical

      - name: Audit for high vulnerabilities (advisory)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Generate audit report
        if: always()
        run: |
          pnpm audit --json > audit-results.json 2>&1 || true
          echo "## Audit Summary"
          pnpm audit --audit-level=moderate 2>&1 | tail -5 || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-results.json
          retention-days: 30

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  container-scan:
    name: Container Security Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - api-health-safety
          - api-environment
          - api-quality
          - api-ai-analysis
          - api-inventory
          - api-hr
          - api-payroll
          - api-workflows
          - api-project-management
          - api-automotive
          - api-medical
          - api-aerospace
          - api-finance
          - api-crm
          - api-infosec
          - api-esg
          - api-cmms
          - api-portal
          - api-food-safety
          - api-energy
          - api-analytics
          - api-field-service
          - api-iso42001
          - api-iso37001
          - api-marketing
          - api-partners
          - api-risk
          - api-training
          - api-suppliers
          - api-assets
          - api-documents
          - api-complaints
          - api-contracts
          - api-ptw
          - api-reg-monitor
          - api-incidents
          - api-audits
          - api-mgmt-review
          - api-setup-wizard
          - api-chemicals
          - api-emergency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          load: true
          tags: ims/${{ matrix.service }}:scan
          build-args: |
            SERVICE=${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ims/${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: |
          npx license-checker --summary --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;Python-2.0" || true

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/default
            p/typescript
            p/nodejs
            p/security-audit
          generateSarif: '1'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  dast:
    name: DAST — OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    # Only run on push to main to avoid blocking PRs on startup delays
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test
      CORE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: dast-test-jwt-secret-that-is-at-least-64-characters-long-for-testing
      JWT_REFRESH_SECRET: dast-test-refresh-secret-at-least-64-characters-long-for-testing
      NODE_ENV: test
      PORT: '4000'
      CSRF_ENABLED: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: pnpm --filter @ims/database generate:all

      - name: Build packages
        run: pnpm build --filter='./packages/*'

      - name: Start API gateway
        run: |
          pnpm --filter api-gateway dev &
          # Wait up to 30s for gateway to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "Gateway is ready after ${i}s"
              break
            fi
            sleep 1
          done
        env:
          PORT: '4000'
          JWT_SECRET: dast-test-jwt-secret-that-is-at-least-64-characters-long-for-testing
          JWT_REFRESH_SECRET: dast-test-refresh-secret-at-least-64-characters-long-for-testing
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test
          CORE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test
          CSRF_ENABLED: 'false'
          NODE_ENV: test

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:4000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-I'
          fail_action: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30

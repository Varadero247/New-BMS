name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: pnpm --filter @ims/database generate:all

      - name: Type check
        run: pnpm tsc --noEmit
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      HEALTH_SAFETY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      ENVIRONMENT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      QUALITY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      HR_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      PAYROLL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      INVENTORY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      WORKFLOWS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      AI_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      PROJECT_MANAGEMENT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      AUTOMOTIVE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      MEDICAL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      AEROSPACE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      FINANCE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      CRM_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      INFOSEC_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      ESG_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      CMMS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      PORTAL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      FOOD_SAFETY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      ENERGY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      ANALYTICS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      FIELD_SERVICE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      ISO42001_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      ISO37001_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      MARKETING_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      PARTNERS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      RISK_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      TRAINING_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      SUPPLIERS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      ASSETS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      DOCUMENTS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      COMPLAINTS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      CONTRACTS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      PTW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      REG_MONITOR_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      INCIDENTS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      AUDITS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      MGMT_REVIEW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      CHEMICALS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      EMERGENCY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      WIZARD_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      MARKETPLACE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      CORE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-that-is-at-least-64-characters-long-for-testing-purposes-only
      JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-64-characters-long-for-testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: pnpm --filter @ims/database generate:all

      - name: Push database schemas
        run: pnpm --filter @ims/database push:all
        continue-on-error: true

      - name: Build packages
        run: pnpm build --filter='./packages/*'

      - name: Run unit tests
        run: pnpm test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          directory: ./coverage
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: pnpm --filter @ims/database generate:all

      - name: Build all
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build
          path: |
            apps/*/dist
            apps/*/.next
            packages/*/dist
          retention-days: 7

  accessibility:
    name: Accessibility & Lighthouse
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Generate Prisma clients
        run: pnpm --filter @ims/database generate:all

      - name: Build packages
        run: pnpm build --filter='./packages/*'

      - name: Build dashboard
        run: pnpm build --filter=web-dashboard

      - name: Run Lighthouse CI
        run: |
          lhci autorun --config=packages/performance/lighthouserc.json || true

      - name: Run accessibility audit
        run: |
          cd packages/performance && node src/accessibility/audit.js || true

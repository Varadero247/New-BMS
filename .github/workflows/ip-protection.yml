name: IP Protection Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: '0 2 1 * *'  # 2am UTC on 1st of every month

jobs:
  licence-check:
    name: Licence Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Run licence audit
        run: |
          npx license-checker --excludePrivatePackages \
            --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;CC-BY-3.0;CC-BY-4.0;0BSD;Unlicense;Python-2.0;BlueOak-1.0.0'

  copyright-check:
    name: Copyright Header Check (new files only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check copyright headers on new TS/JS files
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A origin/main...HEAD \
            | grep -E '\.(ts|js|mjs)$' \
            | grep -v node_modules | grep -v '\.next' || true)
          if [ -z "$NEW_FILES" ]; then
            echo 'No new TS/JS files to check'
            exit 0
          fi
          MISSING=''
          for f in $NEW_FILES; do
            if ! grep -q 'Nexara DMCC' "$f" 2>/dev/null; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing copyright header in:$MISSING"
            exit 1
          fi
          echo 'All new files have copyright headers'

  monthly-escrow:
    name: Monthly Code Escrow Archive
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Create monthly archive
        run: bash ./ip-protection/create_archive.sh
      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ip-archive-${{ github.run_id }}
          path: ip-protection/archives/*.tar.gz
          retention-days: 90

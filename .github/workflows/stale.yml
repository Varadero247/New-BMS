name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # ── Issues ────────────────────────────────────────────────────────
          days-before-issue-stale: 45
          days-before-issue-close: 15
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has had no activity for 45 days and has been marked as stale.
            It will be closed in 15 days unless there is further activity.
            If this issue is still relevant, please add a comment or remove the **stale** label.
          close-issue-message: >
            Closing due to inactivity. If this issue is still relevant, please reopen it
            with updated information or open a new issue linking back to this one.
          close-issue-reason: not_planned

          # ── Pull Requests ─────────────────────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 10
          stale-pr-label: 'stale'
          stale-pr-message: >
            This PR has had no activity for 30 days and has been marked as stale.
            It will be closed in 10 days unless there is further activity.
            If this PR is still in progress, please add a comment or push an update.
          close-pr-message: >
            Closing due to inactivity. The branch remains available — please reopen if you
            want to resume this work.

          # ── Exemptions ────────────────────────────────────────────────────
          # Never mark pinned, in-progress, or blocked items as stale
          exempt-issue-labels: 'pinned,in-progress,blocked,security,critical'
          exempt-pr-labels: 'pinned,in-progress,blocked,do-not-merge,security'
          # Don't stale issues/PRs with open milestones
          exempt-all-milestones: true

          # ── Operational ───────────────────────────────────────────────────
          # Max items processed per run (avoid rate-limit issues on large repos)
          operations-per-run: 100
          remove-stale-when-updated: true
          enable-statistics: true

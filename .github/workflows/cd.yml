name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Check CI status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              check_name: 'Test'
            });
            const passed = checks.check_runs.some(r => r.conclusion === 'success');
            if (!passed) {
              core.setFailed('CI tests have not passed for this commit');
            }

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [ci-gate]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - api-health-safety
          - api-environment
          - api-quality
          - api-ai-analysis
          - api-inventory
          - api-hr
          - api-payroll
          - api-workflows
          - api-project-management
          - api-automotive
          - api-medical
          - api-aerospace
          - api-finance
          - api-crm
          - api-infosec
          - api-esg
          - api-cmms
          - api-portal
          - api-food-safety
          - api-energy
          - api-analytics
          - api-field-service
          - api-iso42001
          - api-iso37001
          - api-marketing
          - api-partners
          - api-risk
          - api-training
          - api-suppliers
          - api-assets
          - api-documents
          - api-complaints
          - api-contracts
          - api-ptw
          - api-reg-monitor
          - api-incidents
          - api-audits
          - api-mgmt-review
          - api-setup-wizard
          - api-chemicals
          - api-emergency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-web:
    name: Build and Push Web Images
    runs-on: ubuntu-latest
    needs: [ci-gate]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - web-dashboard
          - web-health-safety
          - web-environment
          - web-quality
          - web-settings
          - web-inventory
          - web-hr
          - web-payroll
          - web-workflows
          - web-project-management
          - web-automotive
          - web-medical
          - web-aerospace
          - web-finance
          - web-crm
          - web-infosec
          - web-esg
          - web-cmms
          - web-customer-portal
          - web-supplier-portal
          - web-food-safety
          - web-energy
          - web-analytics
          - web-field-service
          - web-iso42001
          - web-iso37001
          - web-marketing
          - web-partners
          - web-admin
          - web-risk
          - web-training
          - web-suppliers
          - web-assets
          - web-documents
          - web-complaints
          - web-contracts
          - web-finance-compliance
          - web-ptw
          - web-reg-monitor
          - web-incidents
          - web-audits
          - web-mgmt-review
          - web-chemicals
          - web-emergency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, build-and-push-web]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy to staging
        run: |
          kubectl apply -k deploy/k8s/overlays/staging
          kubectl rollout status deployment -n ims-staging --timeout=300s

      - name: Smoke test — gateway health
        run: |
          kubectl run smoke-test-gateway --rm -i --restart=Never \
            --image=curlimages/curl:8.5.0 \
            --namespace=ims-staging \
            -- curl -sf http://api-gateway:4000/health || exit 1

      - name: Smoke test — all service health endpoints
        run: |
          # Wait for all pods to be fully ready after rollout
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/part-of=ims \
            --namespace=ims-staging --timeout=120s

          # Check each API service /health endpoint
          SERVICES=(
            "api-health-safety:4001"
            "api-environment:4002"
            "api-quality:4003"
            "api-ai-analysis:4004"
            "api-inventory:4005"
            "api-hr:4006"
            "api-payroll:4007"
            "api-workflows:4008"
            "api-project-management:4009"
            "api-automotive:4010"
            "api-medical:4011"
            "api-aerospace:4012"
            "api-finance:4013"
            "api-crm:4014"
            "api-infosec:4015"
            "api-esg:4016"
            "api-cmms:4017"
            "api-portal:4018"
            "api-food-safety:4019"
            "api-energy:4020"
            "api-analytics:4021"
            "api-field-service:4022"
            "api-iso42001:4023"
            "api-iso37001:4024"
            "api-marketing:4025"
            "api-partners:4026"
            "api-risk:4027"
            "api-training:4028"
            "api-suppliers:4029"
            "api-assets:4030"
            "api-documents:4031"
            "api-complaints:4032"
            "api-contracts:4033"
            "api-ptw:4034"
            "api-reg-monitor:4035"
            "api-incidents:4036"
            "api-audits:4037"
            "api-mgmt-review:4038"
            "api-chemicals:4040"
            "api-emergency:4041"
          )

          FAILED=0
          for entry in "${SERVICES[@]}"; do
            SVC="${entry%%:*}"
            PORT="${entry##*:}"
            kubectl run "smoke-${SVC}" --rm -i --restart=Never \
              --image=curlimages/curl:8.5.0 \
              --namespace=ims-staging \
              -- curl -sf --max-time 10 "http://${SVC}:${PORT}/health" \
              && echo "  PASS: ${SVC}" \
              || { echo "  FAIL: ${SVC}"; FAILED=$((FAILED + 1)); }
          done

          if [ $FAILED -gt 0 ]; then
            echo "Staging smoke tests failed: ${FAILED} service(s) unhealthy"
            exit 1
          fi
          echo "All staging service health checks passed."

      - name: Confirm staging deployment complete
        run: |
          echo "Staging deployment complete."
          echo "Commit: ${{ github.sha }}"
          echo "Services deployed: $(kubectl get deployments -n ims-staging --no-headers | wc -l)"
          kubectl get deployments -n ims-staging

  post-deploy-tests:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: needs.deploy-staging.result == 'success'
    steps:
      - name: Verify OpenAPI spec is accessible
        run: |
          # Wait for services to be ready
          sleep 30
          # Verify OpenAPI endpoint responds
          echo "Post-deployment OpenAPI verification would run here"
          echo "In production: curl -sf https://staging.nexara.io/api/docs/openapi.json"

      - name: Run Finance integration tests against staging
        run: |
          # Finance integration smoke check against deployed staging environment
          echo "Finance integration smoke test would run here"
          echo "In production: ./scripts/test-finance-modules.sh (targeting staging URL)"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, build-and-push-web, deploy-staging, post-deploy-tests]
    if: github.event.inputs.environment == 'production'
    # IMPORTANT: The GitHub environment 'production' must have protection rules configured.
    # Go to: GitHub Settings > Environments > production > Add required reviewer
    # Add at least one required reviewer to enforce manual approval before any production
    # deploy proceeds. Without this gate, workflow_dispatch to production would not require
    # human sign-off.
    environment: production

    steps:
      - name: Manual approval gate
        run: |
          # This step executes only after a required reviewer approves the deployment
          # in the GitHub Actions UI (enforced by the 'production' environment protection rule).
          echo "Manual approval received. Proceeding with production deployment."
          echo "Approved for commit: ${{ github.sha }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy to production
        run: |
          kubectl apply -k deploy/k8s/overlays/prod
          kubectl rollout status deployment -n ims-prod --timeout=600s

      - name: Verify deployment
        run: |
          kubectl get pods -n ims-prod
          kubectl run health-check --rm -i --restart=Never \
            --image=curlimages/curl:8.5.0 \
            --namespace=ims-prod \
            -- curl -sf http://api-gateway:4000/health || exit 1

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, post-deploy-tests, deploy-production]
    if: always()

    steps:
      - name: Notify on success
        if: needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success'
        run: |
          echo "Deployment succeeded"
          # Add Slack/Discord notification here

      - name: Notify on failure
        if: needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure' || needs.post-deploy-tests.result == 'failure'
        run: |
          echo "Deployment failed"
          # Add Slack/Discord notification here

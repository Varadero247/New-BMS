name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Check CI status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              check_name: 'Test'
            });
            const passed = checks.check_runs.some(r => r.conclusion === 'success');
            if (!passed) {
              core.setFailed('CI tests have not passed for this commit');
            }

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [ci-gate]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - api-health-safety
          - api-environment
          - api-quality
          - api-ai-analysis
          - api-inventory
          - api-hr
          - api-payroll
          - api-workflows
          - api-project-management
          - api-automotive
          - api-medical
          - api-aerospace
          - api-finance
          - api-crm
          - api-infosec
          - api-esg
          - api-cmms
          - api-portal
          - api-food-safety
          - api-energy
          - api-analytics
          - api-field-service
          - api-iso42001
          - api-iso37001
          - api-marketing
          - api-partners
          - api-risk
          - api-training
          - api-suppliers
          - api-assets
          - api-documents
          - api-complaints
          - api-contracts
          - api-ptw
          - api-reg-monitor
          - api-incidents
          - api-audits
          - api-mgmt-review
          - api-setup-wizard
          - api-chemicals
          - api-emergency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-web:
    name: Build and Push Web Images
    runs-on: ubuntu-latest
    needs: [ci-gate]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - web-dashboard
          - web-health-safety
          - web-environment
          - web-quality
          - web-settings
          - web-inventory
          - web-hr
          - web-payroll
          - web-workflows
          - web-project-management
          - web-automotive
          - web-medical
          - web-aerospace
          - web-finance
          - web-crm
          - web-infosec
          - web-esg
          - web-cmms
          - web-customer-portal
          - web-supplier-portal
          - web-food-safety
          - web-energy
          - web-analytics
          - web-field-service
          - web-iso42001
          - web-iso37001
          - web-marketing
          - web-partners
          - web-admin
          - web-risk
          - web-training
          - web-suppliers
          - web-assets
          - web-documents
          - web-complaints
          - web-contracts
          - web-finance-compliance
          - web-ptw
          - web-reg-monitor
          - web-incidents
          - web-audits
          - web-mgmt-review
          - web-chemicals
          - web-emergency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, build-and-push-web]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy to staging
        run: |
          kubectl apply -k deploy/k8s/overlays/staging
          kubectl rollout status deployment -n ims-staging --timeout=300s

      - name: Run smoke tests
        run: |
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:8.5.0 \
            --namespace=ims-staging \
            -- curl -sf http://api-gateway:4000/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, build-and-push-web, deploy-staging]
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy to production
        run: |
          kubectl apply -k deploy/k8s/overlays/prod
          kubectl rollout status deployment -n ims-prod --timeout=600s

      - name: Verify deployment
        run: |
          kubectl get pods -n ims-prod
          kubectl run health-check --rm -i --restart=Never \
            --image=curlimages/curl:8.5.0 \
            --namespace=ims-prod \
            -- curl -sf http://api-gateway:4000/health || exit 1

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Notify on success
        if: needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success'
        run: |
          echo "Deployment succeeded"
          # Add Slack/Discord notification here

      - name: Notify on failure
        if: needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure'
        run: |
          echo "Deployment failed"
          # Add Slack/Discord notification here
